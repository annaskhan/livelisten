<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1714"/>
      <stop offset="100%" style="stop-color:#111318"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b896"/>
      <stop offset="100%" style="stop-color:#c4a882"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Sound waves -->
  <g fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="round" opacity="0.4">
    <path d="M320 180 C350 210, 350 302, 320 332"/>
    <path d="M350 150 C395 195, 395 317, 350 362"/>
    <path d="M380 120 C440 180, 440 332, 380 392"/>
  </g>
  <!-- Microphone body -->
  <rect x="190" y="140" width="80" height="140" rx="40" fill="url(#gold)"/>
  <!-- Mic stand arc -->
  <path d="M160 260 C160 320, 190 360, 230 360" fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="round"/>
  <path d="M300 260 C300 320, 270 360, 230 360" fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="round"/>
  <!-- Mic stand -->
  <line x1="230" y1="360" x2="230" y2="410" stroke="url(#gold)" stroke-width="14" stroke-linecap="round"/>
  <line x1="200" y1="410" x2="260" y2="410" stroke="url(#gold)" stroke-width="14" stroke-linecap="round"/>
</svg>
